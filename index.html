<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Órbita 300 · Frutillar</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/nqkMR2b8/Logo-rbita-300-removebg-preview.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/nqkMR2b8/Logo-rbita-300-removebg-preview.png">
<meta property="og:title" content="Órbita 300 · Frutillar">
<meta property="og:description" content="Cafés, pastelería casera, sándwiches y más. Frutillar.">

<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #08080a;
    --card:   #121216;
    --border: #2a2a32;
    --muted:  #8a8a98;
    --text:   #f0f0f5;
    --cafe:   #8B1A1A;
    --fuente: #D4872A;
    --life:   #2D6A4F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(32px, 8vw, 52px) clamp(16px, 5vw, 24px) clamp(40px, 10vw, 56px);
  }
  .wrap { width: 100%; max-width: 480px; }

  .logo { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 9vw, 3.2rem); letter-spacing: 4px; text-align: center; color: var(--text); line-height: 1; font-variant-numeric: lining-nums; }
  .logo-sub { font-size: clamp(0.62rem, 2vw, 0.75rem); letter-spacing: 5px; text-transform: uppercase; color: var(--muted); text-align: center; margin-top: 10px; }
  .divider { width: 40px; height: 1px; background: #3a3a44; margin: 22px auto 28px; }

  .grid { display: flex; flex-direction: column; gap: 14px; }
  a.card {
    display: flex; align-items: center; gap: 18px;
    text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: clamp(14px, 4vw, 20px);
    transition: transform 0.2s;
  }
  a.card:hover { transform: translateY(-2px); }
  a.card:active { transform: scale(0.98); }
  a.card.cafe   { border-left: 4px solid var(--cafe); }
  a.card.fuente { border-left: 4px solid var(--fuente); }
  a.card.life   { border-left: 4px solid var(--life); }
  .card-emoji { font-size: clamp(1.6rem, 5vw, 2rem); width: 44px; text-align: center; flex-shrink: 0; }
  .card-body { flex: 1; }
  .card-body strong { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.1rem, 4vw, 1.35rem); letter-spacing: 3px; display: block; }
  a.card.cafe   .card-body strong { color: #e8b4b4; }
  a.card.fuente .card-body strong { color: var(--fuente); }
  a.card.life   .card-body strong { color: #52B788; }
  .card-body span { font-size: clamp(0.72rem, 2.5vw, 0.8rem); color: var(--muted); margin-top: 3px; display: block; }
  .card-arrow { font-size: 1rem; color: var(--border); flex-shrink: 0; }

  /* CARRUSEL */
  .slider-wrap { position: relative; width: 100%; border-radius: 16px; overflow: hidden; margin-top: 28px; aspect-ratio: 4/3; }
  .slider-track { display: flex; height: 100%; transition: transform 0.5s ease; }
  .slide {
    min-width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: #3a3a44;
  }
  .slide:nth-child(1) { background: #1a1a20; }
  .slide:nth-child(2) { background: #1a1510; }
  .slide:nth-child(3) { background: #10181a; }
  .slide-icon { font-size: 2rem; opacity: 0.25; }
  .slide-label { opacity: 0.35; }
.slider-btn:hover { background: rgba(0,0,0,0.8); }
.slider-btn.next { right: 10px; }
  .slider-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3a44; cursor: pointer; transition: background 0.2s; }
  .dot.active { background: var(--muted); }

  /* FOOTER */
  .footer { margin-top: 36px; text-align: center; }
  .footer-hr { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 2px; color: #4a4a56; margin-bottom: 8px; }
  .location-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  a.location-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--muted); text-decoration: none;
    font-size: clamp(0.72rem, 2.5vw, 0.8rem);
    transition: color 0.2s;
  }
  a.location-link:hover { color: var(--text); }

  .contact-btns { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
  .contact-btn { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: #1a1a20; border: 1px solid #2a2a32; transition: transform .2s; }
  .contact-btn:hover { transform: scale(1.1); }
  .contact-btn svg { width: 26px; height: 26px; }
</style>
</head>
<body>

        </div>

          <div style="position:absolute;inset:0;background-image:url('https://i.ibb.co/S7M9kp1x/Completo-2.jpg');background-size:contain;background-position:center;background-repeat:no-repeat"></div>

      <div class="location-label">¿Dónde nos ubicamos?</div>

  <script>
  let actual = 0;
  const total = 9;
  const track = document.getElementById('track');
  const dots = document.querySelectorAll('.dot');

  function irA(n) {
    actual = (n + total) % total;
    track.style.transform = `translateX(-${actual * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === actual));
  }

  let timer = setInterval(() => mover(1), 4000);

  function mover(dir) {
    clearInterval(timer);
    irA(actual + dir);
    timer = setInterval(() => mover(1), 4000);
  }

  // Swipe táctil
  let startX = 0;
  track.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  }, { passive: true });

  track.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) mover(diff > 0 ? 1 : -1);
  }, { passive: true });
</script>
